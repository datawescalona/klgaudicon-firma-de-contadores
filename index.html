/* KLG AUDICON — Color tokens

   bronze conversion accents, cyan technical highlight. */
:root {
  /* ---- Brand core (sampled from logo) ---- */
  --cobalt-900: #161B6E;
  --cobalt-800: #20289A;
  --cobalt-700: #2C38B8;   /* PRIMARY — logo box blue */
  --cobalt-600: #3A47CF;
  --cobalt-500: #4F5BE0;
  --cobalt-400: #7A84EC;
  --cobalt-200: #C3C8F6;
  --cobalt-100: #E4E6FB;
  --cobalt-050: #F1F2FD;

  /* ---- Deep ink-navy — serious dark surfaces ---- */
  --navy-950: #070A18;     /* near-black hero/footer */
  --navy-900: #0C1230;
  --navy-800: #131C44;
  --navy-700: #1B2657;

  /* ---- Cyan — restrained technical highlight (logo variant) ---- */
  --cyan-600: #0E84A8;
  --cyan-500: #1597C0;     /* used sparingly, deepened (no pastel) */
  --cyan-300: #7FC4DA;
  --cyan-100: #DCEBF1;

  /* ---- Gold — refined premium accent / CTA ---- */
  --gold-700: #8A6A2E;
  --gold-600: #A8844A;     /* CTA base — deep champagne, not orange */
  --gold-500: #C2A263;
  --gold-300: #DCC79A;
  --gold-100: #F1E9D8;
  /* legacy bronze aliases */
  --bronze-700: var(--gold-700);
  --bronze-600: var(--gold-600);
  --bronze-500: var(--gold-500);
  --bronze-300: var(--gold-300);
  --bronze-100: var(--gold-100);

  /* ---- Ink & neutrals ---- */
  --ink-900: #14151B;      /* near-black text */
  --ink-700: #2C2F3A;
  --ink-500: #545967;      /* line-art icon gray */
  --ink-400: #7A8090;
  --ink-300: #A8AEBC;
  --ink-200: #D2D6DF;
  --ink-100: #E8EAEF;

  /* ---- Canvas — cool, corporate, modern ---- */
  --hueso: #F4F6FA;        /* base background (cool light gray) */
  --hueso-deep: #E9EDF4;
  --paper: #FFFFFF;

  /* ---- Feedback ---- */
  --success: #2E8B57;
  --warning: #C9881F;
  --danger:  #C0392B;
  --whatsapp: #25D366;

  /* ================= Semantic aliases ================= */
  --bg-canvas: var(--hueso);
  --bg-surface: var(--paper);
  --bg-sunken: var(--hueso-deep);
  --bg-inverse: var(--navy-950);
  --surface-dark: var(--navy-900);

  --text-strong: var(--ink-900);
  --text-body: var(--ink-700);
  --text-muted: var(--ink-400);
  --text-on-cobalt: #FFFFFF;
  --text-on-bronze: #FFFFFF;
  --text-link: var(--cobalt-700);

  --brand-primary: var(--cobalt-700);
  --brand-primary-hover: var(--cobalt-800);
  --brand-accent: var(--gold-600);
  --cta: var(--gold-600);
  --cta-hover: var(--gold-700);

  --border-subtle: var(--ink-100);
  --border-default: var(--ink-200);
  --border-strong: var(--ink-900);
  --focus-ring: var(--cobalt-500);

  --icon-default: var(--ink-500);
  --icon-strong: var(--ink-900);
}

/* KLG AUDICON — Typography tokens */
:root {
  --font-display: 'Space Grotesk', 'Space Grotesk Fallback', system-ui, sans-serif;
  --font-sans: 'Manrope', system-ui, -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, 'SFMono-Regular', monospace;

  /* Type scale — editorial, generous display sizes */
  --fs-display: clamp(3rem, 6vw, 5rem); /* @kind font */

  --fs-h2: clamp(1.75rem, 3vw, 2.4rem); /* @kind font */
  --fs-h3: 1.5rem; /* @kind font */
  --fs-h4: 1.25rem; /* @kind font */
  --fs-lead: 1.25rem; /* @kind font */
  --fs-body: 1rem; /* @kind font */
  --fs-sm: 0.875rem; /* @kind font */
  --fs-xs: 0.75rem; /* @kind font */

  --fw-medium: 500; /* @kind font */
  --fw-semibold: 600; /* @kind font */
  --fw-bold: 700; /* @kind font */

  --lh-snug: 1.2; /* @kind font */

/* KLG AUDICON — Spacing, radii, shadows, motion, layout */
:root {
  /* Spacing — 4px base */
  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.5rem;
  --space-6: 2rem;
  --space-8: 3rem;
  --space-10: 4rem;
  --space-12: 6rem;

* { box-sizing: border-box; }

h2 { font-size: var(--fs-h2); }
h3 { font-size: var(--fs-h3); }
h4 { font-size: var(--fs-h4); }

a { color: var(--text-link); text-decoration: none; }

  font-size: var(--fs-xs);

   Inline styles win, so these use !important on shared classes.
   ============================================================ */
html, body { max-width: 100%; overflow-x: hidden; }
img { max-width: 100%; }

/* Tablet: 3- and 4-col grids → 2 cols */
@media (max-width: 1040px) {
  .klg-3col { grid-template-columns: repeat(2, 1fr) !important; }
  .klg-4col { grid-template-columns: repeat(2, 1fr) !important; }
}

@media (max-width: 760px) {

  .klg-pad { padding-left: 20px !important; padding-right: 20px !important; }

  .klg-franja > * { border-left: 0 !important; padding-left: 0 !important; padding-right: 0 !important; }
}
@media (max-width: 1040px) {
  .klg-franja { grid-template-columns: repeat(2, 1fr) !important; row-gap: 14px !important; }
}

  nav a[href] { display: none !important; }
}

/* ============================================================

   ============================================================ */

.klg-section {
  min-height: 100vh;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  box-sizing: border-box;
  padding-top: 104px;
  padding-bottom: 56px;
  scroll-snap-align: start;
}

  .klg-snap { scroll-snap-type: none; }
}
@media (max-width: 760px) {

  .klg-snap { scroll-snap-type: none; }
}
@media (prefers-reduced-motion: reduce) {
  .klg-snap { scroll-snap-type: none; }
}

/* WhatsApp FAB — subtle attention pulse (CTA) */
@keyframes klgWaPulse {
  0%   { box-shadow: 0 8px 22px rgba(37,211,102,0.35), 0 0 0 0 rgba(37,211,102,0.45); }
  70%  { box-shadow: 0 8px 22px rgba(37,211,102,0.35), 0 0 0 16px rgba(37,211,102,0); }
  100% { box-shadow: 0 8px 22px rgba(37,211,102,0.35), 0 0 0 0 rgba(37,211,102,0); }
}
.klg-wa-pulse { animation: klgWaPulse 2.4s var(--ease-out) infinite; }
.klg-wa-pulse:hover { animation-play-state: paused; }

/* "24h" badge — gentle glow to draw the eye */
@keyframes klgBadgeGlow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(168,132,74,0.0); transform: scale(1); }
  50%      { box-shadow: 0 0 0 4px rgba(168,132,74,0.22); transform: scale(1.05); }
}
.klg-badge-pulse { animation: klgBadgeGlow 2s var(--ease-out) infinite; }

@media (prefers-reduced-motion: reduce) {
  .klg-wa-pulse, .klg-badge-pulse { animation: none !important; }
}

// Decorative binary stream — right side of the hero so it stays visible.
function BinaryRain() {
  const cols = React.useMemo(() => Array.from({ length: 7 }, () =>
    Array.from({ length: 30 }, () => (Math.random() > 0.5 ? '1' : '0')).join('\n')
  ), []);
  return (
    <div aria-hidden style={{ position: 'absolute', top: 0, right: 0, bottom: 0, width: 'min(46%, 520px)', zIndex: 1, overflow: 'hidden', pointerEvents: 'none', maskImage: 'linear-gradient(270deg, #000 0%, #000 34%, transparent 100%)', WebkitMaskImage: 'linear-gradient(270deg, #000 0%, #000 34%, transparent 100%)' }}>
      <style>{`@keyframes klgFall{from{transform:translateY(-38%)}to{transform:translateY(0)}}`}</style>
      <div style={{ display: 'flex', gap: 26, justifyContent: 'flex-end', paddingRight: 24, height: '100%' }}>
        {cols.map((c, i) => (
          <pre key={i} style={{ margin: 0, fontFamily: 'var(--font-mono)', fontSize: 14, lineHeight: 1.55, color: 'var(--gold-500)', opacity: 0.14 + (i % 3) * 0.05, whiteSpace: 'pre', animation: `klgFall ${7 + i * 1.3}s linear infinite alternate` }}>{c}</pre>
        ))}
      </div>
    </div>
  );
}

// Rotating word after "Necesita".
function RotatingWord() {
  const words = ['Analítica Avanzada', 'Control Interno', 'Prevención de Fraude', 'Información Confiable', 'Blindaje Fiscal'];
  const [i, setI] = React.useState(0);
  const [vis, setVis] = React.useState(true);
  React.useEffect(() => {
    const t = setInterval(() => {
      setVis(false);
      setTimeout(() => { setI((p) => (p + 1) % words.length); setVis(true); }, 320);
    }, 2400);
    return () => clearInterval(t);
  }, []);
  return (
    <span style={{
      color: 'var(--gold-500)', display: 'inline-block',
      opacity: vis ? 1 : 0, transform: vis ? 'translateY(0)' : 'translateY(12px)',
      transition: 'opacity 320ms var(--ease-out), transform 320ms var(--ease-out)',
    }}>{words[i]}.</span>
  );
}

// ---- Zona de confianza: distinct reveal — cards flip up + clip-reveal, staggered ----
function SectorsBand() {
  const ref = React.useRef(null);
  const [shown, setShown] = React.useState(false);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((e) => { if (e.isIntersecting) { setShown(true); obs.disconnect(); } });
    }, { threshold: 0.2 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return (
    <section ref={ref} className="klg-section" style={{ background: 'var(--hueso)', position: 'relative', overflow: 'hidden', borderTop: '1px solid var(--border-subtle)', borderBottom: '1px solid var(--border-subtle)' }}>

<script type="text/babel">
// Root app — routes between marketing screens with a faux router
const { FloatingWA, SiteNav, SiteFooter } = window;

function App() {
  const [view, setView] = React.useState('home');
  const go = (v) => { setView(v); window.scrollTo({ top: 0, behavior: 'instant' }); };

  let screen;
  if (view === 'home') screen = <window.HomeScreen go={go} />;
  else if (view === 'servicios') screen = <window.ServicesPage go={go} />;
  else if (view.startsWith('servicio:')) screen = <window.ServiceScreen serviceId={view.split(':')[1]} go={go} />;
  else if (view === 'blog') screen = <window.BlogScreen go={go} />;
  else if (view === 'contacto') screen = <window.ContactScreen go={go} />;
  else screen = <window.HomeScreen go={go} />;

  const navView = view;

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      <SiteNav view={navView} go={go} />
      <main style={{ flexGrow: 1 }}>{screen}</main>
      <SiteFooter go={go} />
      <FloatingWA />
    </div>
  );
}

// Services index page (all services, reuses ServiceCard grid)
const { Badge, ServiceCard } = window.DesignSystem_b17006;
function ServicesPage({ go }) {
  return (
    <section style={{ maxWidth: 'var(--container)', margin: '0 auto', padding: 'var(--space-12) var(--gutter)' }}>
      <div style={{ textAlign: 'center', marginBottom: 'var(--space-8)' }}>
        <span className="klg-eyebrow">Servicios</span>
        <h1 style={{ fontSize: 'var(--fs-h1)', marginTop: 10 }}>Todo lo contable, bajo un mismo techo</h1>
        <p style={{ color: 'var(--text-muted)', maxWidth: 520, margin: '8px auto 0' }}>Desde auditoría de alto nivel hasta la conciliación express que resuelve tu semana.</p>
      </div>
      <div className="klg-3col" style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 'var(--space-5)' }}>
        {window.KLG_SERVICES.map((s) => (
          <ServiceCard key={s.id} icon={<window.Icon n={s.icon} s={24} />} title={s.title} tone={s.tone} tilt={false}
            badge={<Badge tone={s.gancho ? 'bronze' : 'ink'} className={s.gancho ? 'klg-badge-pulse' : undefined}>{s.tag}</Badge>}
            cta={s.gancho ? 'Quiero esto' : 'Ver servicio'} href="#" onClick={(e) => { e.preventDefault(); go('servicio:' + s.id); }}>
            {s.blurb}
          </ServiceCard>
        ))}
      </div>
    </section>
  );
}

Object.assign(window, { ServicesPage });
ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>

</body>
</html>
