<!-- @dsCard group="Brand" viewport="700x300" name="Logo Lockups" subtitle="Horizontal & stacked, cobalt / black / reversed" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:0; background:var(--paper); display:grid; grid-template-columns:1fr 1fr; grid-auto-rows:1fr; gap:0; }
  .cell { display:flex; align-items:center; justify-content:center; padding:26px; min-height:130px; position:relative; }
  .cell img { max-width:200px; max-height:74px; }
  .tag { position:absolute; top:10px; left:12px; font-family:var(--font-mono); font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:var(--text-muted); }
  .dark { background:var(--cobalt-900); }
  .dark .tag { color:rgba(255,255,255,.6); }
  .b { border:1px solid var(--border-subtle); }
</style></head>
<body>
<div class="cell b"><span class="tag">Horizontal · cobalt</span><img src="../assets/logo-horizontal-cobalt.png" alt="KLG AUDICON" /></div>
<div class="cell b dark"><span class="tag">Reversed</span><img src="../assets/logo-horizontal-white.png" alt="KLG AUDICON" /></div>
<div class="cell b"><span class="tag">Stacked · cobalt</span><img src="../assets/logo-stacked-cobalt.png" alt="KLG AUDICON" style="max-height:96px" /></div>
<div class="cell b"><span class="tag">Horizontal · black</span><img src="../assets/logo-horizontal-black.png" alt="KLG AUDICON" /></div>
</body></html>
