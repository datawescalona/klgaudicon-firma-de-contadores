<!-- @dsCard group="Colors" viewport="700x150" name="Cyan & Bronze — Accents" subtitle="Cyan technical highlight + bronze conversion CTA" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--paper); display:flex; gap:18px; }
  .group { flex:1; }
  .swatches { display:flex; gap:0; border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-sm); }
  .sw { flex:1; height:72px; display:flex; align-items:flex-end; padding:7px; }
  .sw span { font-family:var(--font-mono); font-size:10px; }
  .meta { margin-top:9px; font-family:var(--font-mono); font-size:11px; color:var(--text-muted); }
</style></head>
<body>
<div class="group">
  <div class="swatches">
    <div class="sw" style="background:var(--cyan-600)"><span style="color:#fff">600</span></div>
    <div class="sw" style="background:var(--cyan-500)"><span style="color:#0a3a48">500</span></div>
    <div class="sw" style="background:var(--cyan-300)"><span style="color:#0a3a48">300</span></div>
    <div class="sw" style="background:var(--cyan-100)"><span style="color:#0a3a48">100</span></div>
  </div>
  <div class="meta">Cyan · #1BC8F5 — technical highlight, rules, accents</div>
</div>
<div class="group">
  <div class="swatches">
    <div class="sw" style="background:var(--bronze-700)"><span style="color:#fff">700</span></div>
    <div class="sw" style="background:var(--bronze-600)"><span style="color:#fff">600 ·cta</span></div>
    <div class="sw" style="background:var(--bronze-300)"><span style="color:#3a2510">300</span></div>
    <div class="sw" style="background:var(--bronze-100)"><span style="color:#3a2510">100</span></div>
  </div>
  <div class="meta">Bronze · #B97A39 — conversion CTAs only</div>
</div>
</body></html>
