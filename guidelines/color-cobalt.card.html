<!-- @dsCard group="Colors" viewport="700x150" name="Cobalt — Primary" subtitle="Brand authority blue, sampled from the logo mark" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--paper); }
  .swatches { display:flex; gap:0; border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-sm); }
  .sw { flex:1; height:88px; display:flex; align-items:flex-end; padding:8px; }
  .sw span { font-family:var(--font-mono); font-size:10px; letter-spacing:.04em; }
  .meta { margin-top:10px; font-family:var(--font-mono); font-size:11px; color:var(--text-muted); letter-spacing:.04em; }
</style></head>
<body>
<div class="swatches">
  <div class="sw" style="background:var(--cobalt-900)"><span style="color:#fff">900</span></div>
  <div class="sw" style="background:var(--cobalt-800)"><span style="color:#fff">800</span></div>
  <div class="sw" style="background:var(--cobalt-700)"><span style="color:#fff">700 ·primary</span></div>
  <div class="sw" style="background:var(--cobalt-500)"><span style="color:#fff">500</span></div>
  <div class="sw" style="background:var(--cobalt-200)"><span style="color:var(--cobalt-900)">200</span></div>
  <div class="sw" style="background:var(--cobalt-050)"><span style="color:var(--cobalt-900)">050</span></div>
</div>
<div class="meta">--cobalt-700&nbsp;&nbsp;#2C38B8 &nbsp;·&nbsp; the KLG box blue — primary actions, links, headlines</div>
</body></html>
