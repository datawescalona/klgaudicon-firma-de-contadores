<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:18px 24px; background:var(--paper); }
  .r { display:flex; align-items:baseline; gap:16px; border-bottom:1px solid var(--border-subtle); padding:6px 0; }
  .r:last-child { border:0; }
  .t { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); width:64px; flex-shrink:0; }
</style></head>
<body>
<div class="r"><span class="t">display</span><span style="font-family:var(--font-display);font-weight:700;font-size:32px;letter-spacing:-.02em;color:var(--text-strong);">Aa</span><span style="color:var(--text-muted);font-size:13px;">48–80px / hero</span></div>
<div class="r"><span class="t">h1 · h2</span><span style="font-family:var(--font-display);font-weight:700;font-size:24px;color:var(--text-strong);">Aa</span><span style="color:var(--text-muted);font-size:13px;">36–52 / 28–38</span></div>
<div class="r"><span class="t">lead</span><span style="font-family:var(--font-sans);font-weight:500;font-size:18px;color:var(--text-strong);">Aa</span><span style="color:var(--text-muted);font-size:13px;">20px intro</span></div>
<div class="r"><span class="t">body</span><span style="font-family:var(--font-sans);font-size:15px;color:var(--text-strong);">Aa</span><span style="color:var(--text-muted);font-size:13px;">16px · sm 14 · xs 12</span></div>
</body></html>
