<!-- @dsCard group="Spacing" viewport="700x150" name="Radii & Shadows" subtitle="Editorial corners + soft sticker shadows" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:24px; background:var(--hueso); display:flex; gap:30px; align-items:center; }
  .grp { display:flex; gap:14px; align-items:flex-end; }
  .box { width:64px; height:56px; background:var(--paper); display:flex; align-items:flex-end; justify-content:center; padding:5px; }
  .lab { font-family:var(--font-mono); font-size:9px; color:var(--text-muted); }
</style></head>
<body>
<div class="grp">
  <div class="box" style="border-radius:var(--radius-sm); box-shadow:var(--shadow-xs)"><span class="lab">sm 6</span></div>
  <div class="box" style="border-radius:var(--radius-md); box-shadow:var(--shadow-sm)"><span class="lab">md 10</span></div>
  <div class="box" style="border-radius:var(--radius-lg); box-shadow:var(--shadow-md)"><span class="lab">lg 16</span></div>
  <div class="box" style="border-radius:var(--radius-pill); box-shadow:var(--shadow-sticker); width:80px"><span class="lab">pill</span></div>
</div>
<div class="grp">
  <div class="box" style="border-radius:var(--radius-lg); box-shadow:var(--shadow-lg)"><span class="lab">lg shadow</span></div>
  <div class="box" style="border-radius:var(--radius-lg); box-shadow:var(--shadow-cobalt)"><span class="lab">cobalt</span></div>
  <div class="box" style="border-radius:var(--radius-lg); box-shadow:var(--shadow-bronze)"><span class="lab">bronze</span></div>
</div>
</body></html>
