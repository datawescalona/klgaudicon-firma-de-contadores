<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base — 1 through 16" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:22px 24px; background:var(--paper); }
  .row { display:flex; align-items:flex-end; gap:14px; }
  .b { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .bar { background:var(--cobalt-700); border-radius:3px; width:26px; }
  .lab { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); }
</style></head>
<body>
<div class="row">
  <div class="b"><div class="bar" style="height:4px"></div><span class="lab">1·4</span></div>
  <div class="b"><div class="bar" style="height:8px"></div><span class="lab">2·8</span></div>
  <div class="b"><div class="bar" style="height:12px"></div><span class="lab">3·12</span></div>
  <div class="b"><div class="bar" style="height:16px"></div><span class="lab">4·16</span></div>
  <div class="b"><div class="bar" style="height:24px"></div><span class="lab">5·24</span></div>
  <div class="b"><div class="bar" style="height:32px"></div><span class="lab">6·32</span></div>
  <div class="b"><div class="bar" style="height:48px"></div><span class="lab">8·48</span></div>
  <div class="b"><div class="bar" style="height:64px"></div><span class="lab">10·64</span></div>
  <div class="b"><div class="bar" style="height:80px"></div><span class="lab">12·96</span></div>
</div>
</body></html>
