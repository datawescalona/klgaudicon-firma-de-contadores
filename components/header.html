function useNavTheme(view) {
  const [theme, setTheme] = React.useState(window.KLG_INITIAL === 'home' || !window.KLG_INITIAL ? 'dark' : 'light');
  const [scrolled, setScrolled] = React.useState(false);
  const headerRef = React.useRef(null);
  const measureRef = React.useRef(() => {});
  React.useEffect(() => {
    let raf = 0;
    const measure = () => {
      raf = 0;
      const h = headerRef.current;
      if (!h) return;
      const y = h.offsetHeight + 6;
      const prev = h.style.pointerEvents;
      h.style.pointerEvents = 'none';
      const el = document.elementFromPoint(Math.round(window.innerWidth / 2), y);
      h.style.pointerEvents = prev;
      const themed = el && el.closest && el.closest('[data-nav-theme]');
      setTheme(themed ? themed.getAttribute('data-nav-theme') : 'light');
      setScrolled(window.scrollY > 8);
    };
    measureRef.current = measure;
    const onScroll = () => { if (!raf) raf = requestAnimationFrame(measure); };
    measure();
    const t = setTimeout(measure, 200);
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll);
    return () => { window.removeEventListener('scroll', onScroll); window.removeEventListener('resize', onScroll); clearTimeout(t); cancelAnimationFrame(raf); };
  }, []);
  // Re-measure after a route change repaints (content swaps without remounting the header).
  React.useEffect(() => {
    const ids = [0, 60, 180, 360].map((d) => setTimeout(() => measureRef.current(), d));
    const r = requestAnimationFrame(() => measureRef.current());
    return () => { ids.forEach(clearTimeout); cancelAnimationFrame(r); };
  }, [view]);
  return [theme, headerRef, scrolled];
}

// Dropdown por categoría — grid de 2 columnas: ícono + título corto + descripción de una línea por hija.
// Se ancla debajo de su propio trigger (no al centro del viewport, porque ahora hay 5 triggers distintos).
function CatDropdown({ cat, go, align }) {
  const base = window.KLG_BASE || '';
  const cols = cat.children.length > 4 ? '1fr 1fr' : '1fr';
  const posStyle = align === 'right' ? { right: 0 } : { left: 0 };
  return (
    <div style={{
      position: 'absolute', top: 'calc(100% + 8px)', ...posStyle,
      width: 'min(600px, calc(100vw - 32px))', background: '#fff', borderRadius: 18,
      boxShadow: '0 30px 70px rgba(9,13,30,0.28)', border: '1px solid rgba(20,21,27,0.06)',
      padding: 18, display: 'grid', gridTemplateColumns: cat.featured ? '1.4fr 1fr' : '1fr', gap: 16, zIndex: 60,
    }}>
      <div style={{ display: 'grid', gridTemplateColumns: cols, gap: 4, alignContent: 'start' }}>
        {cat.children.map((c) => (
          <a key={c.href} href={base + c.href}
            onClick={(e) => { if (!window.KLG_PAGES) { e.preventDefault(); go('page:' + c.href); } }}
            style={{ display: 'flex', gap: 11, padding: '10px 10px', borderRadius: 12, textDecoration: 'none', transition: 'background 160ms' }}
            onMouseEnter={(e) => e.currentTarget.style.background = 'var(--cobalt-050)'}
            onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}>
            <span style={{ width: 34, height: 34, flexShrink: 0, borderRadius: 9, background: 'var(--cobalt-050)', color: 'var(--cobalt-700)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}><Icon n={c.icon} s={17} /></span>
            <span>
              <span style={{ display: 'block', fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 13.5, color: 'var(--text-strong)', lineHeight: 1.25 }}>{c.label}</span>
              <span style={{ display: 'block', fontSize: 11.5, color: 'var(--text-muted)', marginTop: 2, lineHeight: 1.35 }}>{c.desc}</span>
            </span>
          </a>
        ))}
      </div>
      {cat.featured && (
        <a href={base + cat.featured.href} onClick={(e) => { if (!window.KLG_PAGES) { e.preventDefault(); go('page:' + cat.featured.href); } }}
          style={{ position: 'relative', borderRadius: 14, overflow: 'hidden', textDecoration: 'none', background: 'var(--navy-950)', minHeight: 230, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end' }}>
          <image-slot id={'mega-' + cat.id} fit="cover"
            placeholder={'Foto — ' + cat.featured.label}
            style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', display: 'block' }}></image-slot>
          <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(0deg, var(--navy-950) 20%, rgba(9,13,30,0.15) 78%)' }}></div>
          <div style={{ position: 'relative', padding: 16 }}>
            <span style={{ display: 'inline-block', fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--navy-950)', background: 'var(--gold-500)', padding: '4px 9px', borderRadius: 999 }}>Más buscado</span>
            <div style={{ color: '#fff', fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 16, marginTop: 9 }}>{cat.featured.label}</div>
            <div style={{ color: 'rgba(255,255,255,0.78)', fontSize: 12.5, marginTop: 4, lineHeight: 1.4 }}>{cat.featured.desc}</div>
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, color: 'var(--gold-300)', fontWeight: 700, fontSize: 12.5, marginTop: 11 }}>Quiero esto <Icon n="arrow-right" s={14} /></span>
          </div>
        </a>
      )}
    </div>
  );
}

function SiteNav({ view, go }) {
  const [theme, headerRef, scrolled] = useNavTheme(view);
  const [openCat, setOpenCat] = React.useState(null);
  const [mobile, setMobile] = React.useState(false);
  const [mAcc, setMAcc] = React.useState(null);
  const closeT = React.useRef(0);
  const t = NAV_THEME[theme] || NAV_THEME.light;
  const navMenu = window.KLG_NAV_MENU || [];
  const consultoria = window.KLG_NAV_CONSULTORIA || { label: 'Consultoría', href: 'consultoria-asesoria-contable-fiscal/' };

  React.useEffect(() => {
    document.body.style.overflow = mobile ? 'hidden' : '';
    return () => { document.body.style.overflow = ''; };
  }, [mobile]);

  const openCatMenu = (id) => { clearTimeout(closeT.current); setOpenCat(id); };
  const closeCatMenu = () => { closeT.current = setTimeout(() => setOpenCat(null), 140); };

  const navTo = (id) => { setMobile(false); go(id); };
  const navToPage = (href) => { setMobile(false); if (window.KLG_PAGES) { window.location.href = (window.KLG_BASE || '') + href; } };

  return (
    <React.Fragment>
      <header ref={headerRef} style={{
        position: 'fixed', top: 0, left: 0, right: 0, zIndex: 50, height: 68,
        background: scrolled ? t.bgScrolled : t.bg, backdropFilter: 'blur(16px) saturate(150%)', WebkitBackdropFilter: 'blur(16px) saturate(150%)',
        borderBottom: `1px solid ${scrolled ? t.border : 'transparent'}`,
        transition: 'background 360ms var(--ease-out), border-color 360ms var(--ease-out)',
      }}>
        <div className="klg-pad" style={{ maxWidth: 'var(--container)', margin: '0 auto', height: '100%', padding: '0 var(--gutter)', display: 'flex', alignItems: 'center', gap: 28 }}>
          <a href={window.KLG_BASE || ''} onClick={(e) => { if (!window.KLG_PAGES) { e.preventDefault(); navTo('home'); } }} style={{ display: 'flex', alignItems: 'center', flexShrink: 0 }}>
            <img src={t.logo} alt="KLG AUDICON" style={{ height: 24, display: 'block', transition: 'opacity 200ms' }} />
          </a>

          {/* desktop links — el logo ya ancla "Inicio", no se repite en el menú */}
          <nav className="klg-nav-desktop" style={{ display: 'flex', alignItems: 'center', gap: 0, flexGrow: 1 }}>
            {navMenu.map((cat, i) => (
              <div key={cat.id} style={{ position: 'relative' }} onMouseEnter={() => openCatMenu(cat.id)} onMouseLeave={closeCatMenu}>
                <NavLink t={t} active={openCat === cat.id} label={cat.label} href={(window.KLG_BASE || '') + cat.href}
                  caret caretOpen={openCat === cat.id} onClick={() => navToPage(cat.href)} />
                {openCat === cat.id && <CatDropdown cat={cat} go={navTo} align={i < 3 ? 'left' : 'right'} />}
              </div>
            ))}
            <NavLink t={t} active={false} label={consultoria.label} href={(window.KLG_BASE || '') + consultoria.href} onClick={() => navToPage(consultoria.href)} />
          </nav>

          {/* desktop CTA — reemplaza "Hablemos" + el ítem "Contacto": cumple ambas funciones */}
          <div className="klg-nav-desktop" style={{ flexShrink: 0 }}>
            <Button variant="cta" size="sm" onClick={() => navTo('contacto')} style={{ border: 'none' }}>Contáctanos</Button>
          </div>

          {/* mobile hamburger */}
          <button className="klg-nav-mobile" onClick={() => setMobile(true)} aria-label="Menú"
            style={{ marginLeft: 'auto', background: 'transparent', border: 0, color: t.text, cursor: 'pointer', display: 'none', padding: 6 }}>
            <Icon n="menu" s={26} />
          </button>
        </div>
      </header>

      {/* mobile overlay */}
      <div className="klg-nav-mobile" style={{
        position: 'fixed', inset: 0, zIndex: 70, background: 'var(--navy-950)', color: '#fff',
        display: mobile ? 'flex' : 'none', flexDirection: 'column',
      }}>

// Subcategoría móvil: tinte + texto dorado al pasar/seleccionar.
function MSub({ s, onClick }) {
  const [hov, setHov] = React.useState(false);
  return (
    <button onClick={onClick} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ display: 'flex', gap: 12, alignItems: 'center', width: '100%', textAlign: 'left', border: 0, borderRadius: 10, padding: '11px 12px', cursor: 'pointer', background: hov ? 'rgba(168,132,74,0.12)' : 'transparent', color: hov ? 'var(--gold-300)' : 'rgba(255,255,255,0.82)', transition: 'background 180ms var(--ease-out), color 180ms var(--ease-out)' }}>
      <span style={{ width: 34, height: 34, flexShrink: 0, borderRadius: 8, background: hov ? 'rgba(168,132,74,0.30)' : 'rgba(168,132,74,0.18)', color: 'var(--gold-400, #C2A263)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', transition: 'background 180ms var(--ease-out)' }}><Icon n={s.icon} s={17} /></span>
      <span style={{ fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 15.5, lineHeight: 1.3 }}>{s.title}</span>
    </button>
  );
}

// Red social móvil: dorado al pasar el mouse, como en el footer.
function MSocial({ s }) {
  const [hov, setHov] = React.useState(false);
  return (
    <a href={s.href} target="_blank" rel="noopener noreferrer" aria-label={s.name}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ width: 44, height: 44, borderRadius: 12, background: hov ? 'var(--gold-600)' : 'rgba(255,255,255,0.08)', color: '#fff', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', transform: hov ? 'translateY(-2px)' : 'none', transition: 'background 200ms var(--ease-out), transform 200ms var(--ease-out)' }}>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden><path d={s.path} /></svg>
    </a>
  );
}

// Minimalist mobile nav link: animated gold underline grows from the left on hover.
function MLink({ label, onClick, right }) {
  const [hov, setHov] = React.useState(false);
  return (
    <button onClick={onClick} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ ...mobileLink, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
      <span style={{ position: 'relative' }}>
        {label}
        <span style={{ position: 'absolute', left: 0, right: 0, bottom: -4, height: 2, borderRadius: 2, background: 'var(--gold-500)', transformOrigin: 'left center', transform: hov ? 'scaleX(1)' : 'scaleX(0)', transition: 'transform 260ms var(--ease-out)' }}></span>
      </span>
      {right || null}
    </button>
  );
}

// Minimalist nav link: animated gold underline grows from the left on hover/active.
function NavLink({ t, active, label, href, onClick, as, caret, caretOpen }) {
  const [hov, setHov] = React.useState(false);
  const on = active || hov;
  const inner = (
    <React.Fragment>
      <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5 }}>
        {label}
        {caret && <span style={{ display: 'inline-flex', transform: caretOpen ? 'rotate(180deg)' : 'none', transition: 'transform 220ms var(--ease-out)' }}><Icon n="chevron-down" s={15} /></span>}
      </span>
      <span style={{ position: 'absolute', left: 11, right: 11, bottom: 14, height: 2, borderRadius: 2, background: 'var(--gold-500)', transformOrigin: 'left center', transform: on ? 'scaleX(1)' : 'scaleX(0)', transition: 'transform 260ms var(--ease-out)' }}></span>
    </React.Fragment>
  );
  const style = {
    position: 'relative', fontFamily: 'var(--font-sans)', fontSize: 15, fontWeight: 600,
    color: on ? t.text : t.textMuted, textDecoration: 'none', padding: '22px 11px',
    lineHeight: 1, whiteSpace: 'nowrap', background: 'transparent', border: 0, cursor: 'pointer',
    font: 'inherit', transition: 'color 220ms var(--ease-out)', fontWeight: 600,
  };
  const handlers = {
    onMouseEnter: () => setHov(true), onMouseLeave: () => setHov(false),
    onClick: (e) => { if (!window.KLG_PAGES && href != null) e.preventDefault(); onClick && onClick(e); },
  };
  if (as === 'button') return <button style={style} {...handlers}>{inner}</button>;
  return <a href={href} style={style} {...handlers}>{inner}</a>;
}
