<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style> body { padding: 28px; background: var(--hueso); } .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 18px; } </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Input } = window.DesignSystem_b17006;
const I = (n) => <i data-lucide={n} style={{width:18,height:18}}></i>;
function Demo(){
  React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
  return (
    <div className="grid">
      <Input label="Nombre y apellido" placeholder="Tu nombre" icon={I('user')} />
      <Input label="Correo corporativo" type="email" placeholder="empresa@correo.com" icon={I('mail')} hint="Respuesta en 24h." />
      <Input label="Servicio de interés" as="select" options={['Auditoría','Outsourcing contable','Outsourcing de nómina','Estrategia tributaria']} />
      <Input label="RIF" placeholder="J-00000000-0" icon={I('hash')} error="Formato de RIF inválido." />
      <div style={{gridColumn:'1 / -1'}}>
        <Input label="¿Cómo podemos ayudarte?" as="textarea" placeholder="Cuéntanos sobre tu empresa…" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
