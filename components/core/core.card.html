<!-- @dsCard group="Components" viewport="700x460" name="Core — Buttons, Badges, Cards" subtitle="Pill buttons, mono badges, editorial cards, icon tiles" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { padding: 28px; background: var(--hueso); }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 14px; margin-bottom: 22px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); width: 100%; margin-bottom: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Button, Badge, Card, IconTile } = window.DesignSystem_b17006;
const I = (n, sz=22) => <i data-lucide={n} style={{width:sz,height:sz}}></i>;

function Demo() {
  React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
  return (
    <div>
      <div className="row"><span className="lbl">Buttons</span>
        <Button variant="primary">Auditoría</Button>
        <Button variant="cta" icon={I('zap',18)}>Conciliación 24h</Button>
        <Button variant="secondary">Ver servicios</Button>
        <Button variant="ghost">Saber más</Button>
        <Button variant="primary" size="sm">sm</Button>
        <Button variant="primary" disabled>Disabled</Button>
      </div>
      <div className="row"><span className="lbl">Badges</span>
        <Badge tone="cobalt">Auditoría</Badge>
        <Badge tone="cyan" dot>Control interno</Badge>
        <Badge tone="bronze">Gancho 24h</Badge>
        <Badge tone="success" dot>Activo</Badge>
        <Badge tone="ink">SENIAT</Badge>
        <Badge tone="solid">Destacado</Badge>
      </div>
      <span className="lbl">Cards &amp; icon tiles</span>
      <div className="grid" style={{marginTop:10}}>
        <Card tilt accent>
          <IconTile icon={I('search-check')} tone="cobalt" />
          <h4 style={{margin:'12px 0 4px'}}>Auditoría</h4>
          <p style={{margin:0,fontSize:13,color:'var(--text-muted)'}}>Razonabilidad de estados financieros.</p>
        </Card>
        <Card interactive>
          <IconTile icon={I('calculator')} tone="cyan" />
          <h4 style={{margin:'12px 0 4px'}}>Outsourcing</h4>
          <p style={{margin:0,fontSize:13,color:'var(--text-muted)'}}>Conciliaciones y libros legales.</p>
        </Card>
        <Card tilt="alt">
          <IconTile icon={I('receipt-text')} tone="bronze" />
          <h4 style={{margin:'12px 0 4px'}}>Tributos</h4>
          <p style={{margin:0,fontSize:13,color:'var(--text-muted)'}}>IVA, ISLR, IGTF y retenciones.</p>
        </Card>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
